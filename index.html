<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Library</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel&display=swap");
    </style>
  </head>
  <body>
    <header>
      <h1>Your Library</h1>
    </header>
    <main class="librarysection">
      It's empty here... Add your first book!
    </main>
    <button class="addBook" command="show-modal" commandfor="addBookModal">
      <svg class="addBookIcon"><use href="icons/library_add.svg" /></svg>
    </button>
    <dialog id="addBookModal">
      <form id="bookentry">
        <fieldset>
          <div class="wrapper">
            <legend>Enter book details</legend>
            <label for="bookTitle">Title</label>
            <input type="text" name="bookTitle" id="bookTitle" />
            <label for="bookAuthor">Author </label>
            <input type="text" name="bookAuthor" id="bookAuthor" />
            <label for="bookYear">Year of publication </label>
            <input type="tel" name="bookYear" id="bookYear" />
            <label for="bookPages">Page count </label>
            <input type="tel" name="bookPages" id="bookPages" />
            <label for="bookIsRead">Mark as read </label>
            <input type="checkbox" name="bookIsRead" value="true" id="bookIsRead" />
          </div>
        </fieldset>
      </form>
      <div class="btnContainer">
        <button class="modalBtn"command="close" commandfor="addBookModal">Add to library</button>
        <button class="cancel" command="close" commandfor="addBookModal">Cancel</button>
            </dialog>
      </div>
  </body>
  <script src="script.js"></script>
</html>
